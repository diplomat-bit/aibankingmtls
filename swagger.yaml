swagger: "2.0"
info:
  description: " APIs will be used by Citi Partners to authenticate and generate OAuth\
    \ Access Token to consume protected apis used for app registration, update, retrieve\
    \ and revoke the same \""
  version: 1.0.0
  title: Dynamic Client Registration Authorization
basePath: /api/dcr/v1/authorize
paths:
  /token:
    post:
      tags:
      - authorizationTokenRequest
      summary: DCR-Authorization
      description: This Api used to autheticate partner and generate OAuth Access
        Token
      operationId: authenPartner
      parameters:
      - name: Authorization
        in: header
        description: Base 64 encoded value of client_id and client_secret
        required: true
        type: string
      - name: Content-Type
        in: header
        description: Content types that are acceptable for the request. Currently
          this operation only supports application/x-www-form-urlencoded
        required: true
        type: string
        default: application/x-www-form-urlencoded
      - name: uuid
        in: header
        description: 128 bit random UUID generated uniquely for every request
        required: true
        type: string
        default: 4468adf1-adfe-4f85-a2c1-f29beaa1f6ee
      - in: body
        name: Body
        required: true
        schema:
          originalRef: '#/definitions/ClientAuthenRequest'
          $ref: '#/definitions/ClientAuthenRequest'
      responses:
        "200":
          description: Successful operation.
          responseSchema:
            originalRef: '#/definitions/ClientAuthenResponse'
            $ref: '#/definitions/ClientAuthenResponse'
          schema:
            originalRef: '#/definitions/ClientAuthenResponse'
            $ref: '#/definitions/ClientAuthenResponse'
