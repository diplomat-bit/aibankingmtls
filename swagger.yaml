definitions:
  ClientAuthenRequest:
    required:
    - grant_type
    - scope
    properties:
      grant_type:
        type: string
        description: Name of the OAuth Grant Type requested
        default: client_credentials
      scope:
        type: string
        description: Scope binded to the OAuth Access Token generated by IDP
        default: app_registration
  ClientAuthenResponse:
    properties:
      token_type:
        type: string
        description: Token Type is Bearer
        default: Bearer
      access_token:
        type: string
        description: OAuth Access Token value of atleast 256 length
      expires_in:
        type: integer
        description: token validity  in seconds
      scope:
        type: string
        description: Scope value of the OAuth Access Token
        default: app_registration
  ErrorResponse:
    type: object
    required:
    - code
    - type
    properties:
      code:
        type: integer
        description: Error code
      details:
        type: string
        description: Verbose explanation of the error
      type:
        type: string
        description: error type
        default: error
