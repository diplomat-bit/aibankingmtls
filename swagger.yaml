            $ref: '#/definitions/ErrorResponse'
        "401":
          description: <table class="table"><tr><td>Type</td><td>Code</td><td>Details</td></tr><tr><td>error</td><td>unAuthorized</td><td>Authorization
            credentials are invalid</td></tr></table>
          responseSchema:
            originalRef: '#/definitions/ErrorResponse'
            $ref: '#/definitions/ErrorResponse'
          schema:
            originalRef: '#/definitions/ErrorResponse'
            $ref: '#/definitions/ErrorResponse'
        "403":
